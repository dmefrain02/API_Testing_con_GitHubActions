name: API Tests with Newman
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
jobs:
  test-api:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24'

      - name: Install Newman
        run: npm install -g newman
        
      - name: Run API tests
        run: newman run tests/Collection.json -e tests/Enviroments.json -r
